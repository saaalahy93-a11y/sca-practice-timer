# Builds iOS on GitHub's Mac runners — no local Xcode required.
# Secrets (optional, for signed device IPA):
#   IOS_P12_BASE64, IOS_P12_PASSWORD, IOS_TEAM_ID

name: iOS Cloud Build

on:
  workflow_dispatch:
  push:
    paths:
      - "www/**"
      - "ios/**"
      - "capacitor.config.json"
      - ".github/workflows/ios-cloud-build.yml"

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps + sync Capacitor
        run: |
          npm ci || npm install
          npx cap sync ios

      - name: Pod install
        working-directory: ios/App
        run: pod install

      - name: Import signing cert (optional)
        id: certs
        continue-on-error: true
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Build simulator package (no Apple portal needed)
        working-directory: ios/App
        run: |
          set -euo pipefail
          mkdir -p build/ipa
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
          APP_PATH="$(find build/DerivedData -name 'App.app' -type d | head -1)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/ipa/SCA_Timer_iOS_Simulator.zip
          ls -lah build/ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sca-timer-ios
          path: ios/App/build/ipa/*
          if-no-files-found: error
